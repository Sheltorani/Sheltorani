<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Sheltorani</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="logo.png" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="logo.png" alt="Sheltorani" onerror="this.style.display='none'" />
      <div>
        <div class="nav-logo-text">Sheltorani</div>
        <div class="nav-logo-sub">Private Perfumery</div>
      </div>
    </a>
    <a href="track.html" class="nav-track-btn">Track Order</a>
  </nav>

  <div class="confirm-page" style="padding-top:80px">
    <div class="confirm-icon">✦</div>
    <h1 class="confirm-title">Order Received</h1>
    <p style="font-family:var(--font-serif);font-size:1.1rem;color:var(--text-muted);font-style:italic">
      Your fragrance is being prepared
    </p>

    <!-- ORDER CODE -->
    <div style="margin:1.5rem 0;text-align:center">
      <div style="font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem">
        Your Order Code
      </div>
      <div class="confirm-code" id="confirmCode">SHT-????</div>

      <!-- COPY BUTTON -->
      <button id="copyBtn" onclick="copyCode()" style="
        margin-top:0.75rem;
        background:transparent;
        border:1px solid var(--border);
        border-radius:var(--radius);
        color:var(--text-muted);
        font-family:var(--font-body);
        font-size:0.7rem;
        letter-spacing:0.15em;
        text-transform:uppercase;
        padding:0.5rem 1.2rem;
        cursor:pointer;
        transition:var(--transition);
      ">📋 Copy Code</button>
    </div>

    <!-- ORDER SUMMARY -->
    <div id="orderSummary" style="
      background:var(--marble-2);
      border:1px solid var(--border-soft);
      border-radius:var(--radius-lg);
      padding:1.25rem 1.5rem;
      margin-bottom:2rem;
      text-align:left;
      max-width:360px;
      width:100%;
    "></div>

    <!-- MAIN ACTION: TRACK -->
    <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:0.75rem">
      <a id="trackBtn" href="track.html" class="btn-gold" style="text-align:center;padding:1.1rem">
        📍 Track My Order Live
      </a>
      <a href="index.html" class="btn-outline" style="text-align:center">
        Back to Collection
      </a>
    </div>

    <p style="margin-top:2rem;font-size:0.75rem;color:var(--text-muted);max-width:300px;line-height:1.6;text-align:center">
      We deliver to your campus location and collect cash on arrival.<br/>
      Questions? <a href="https://wa.me/254745773645" style="color:var(--gold);text-decoration:none">WhatsApp us →</a>
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    if (!orderId) { window.location.href = 'index.html'; }

    document.getElementById('confirmCode').textContent = orderId;
    // Track button auto-fills the order code
    document.getElementById('trackBtn').href = `track.html?id=${orderId}`;

    // Load summary
    const stored = localStorage.getItem(`order_${orderId}`);
    if (stored) {
      const order = JSON.parse(stored);
      document.getElementById('orderSummary').innerHTML = `
        <div style="display:grid;gap:0.75rem">
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted)">Perfume</span>
            <span style="font-family:var(--font-serif);color:var(--cream)">${order.perfume}</span>
          </div>
          <div style="height:1px;background:var(--border-soft)"></div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted)">Size</span>
            <span style="font-family:var(--font-serif);color:var(--cream)">${order.size}ml</span>
          </div>
          <div style="height:1px;background:var(--border-soft)"></div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted)">Total</span>
            <span style="font-family:var(--font-serif);font-size:1.2rem;color:var(--gold)">KSh ${order.price}</span>
          </div>
          <div style="height:1px;background:var(--border-soft)"></div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted)">Payment</span>
            <span style="font-family:var(--font-serif);color:var(--cream)">Cash on Delivery</span>
          </div>
        </div>
      `;
    }

    // Copy code
    function copyCode() {
      navigator.clipboard.writeText(orderId).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ Copied!';
        btn.style.color = 'var(--gold)';
        btn.style.borderColor = 'var(--gold)';
        setTimeout(() => {
          btn.textContent = '📋 Copy Code';
          btn.style.color = 'var(--text-muted)';
          btn.style.borderColor = 'var(--border)';
        }, 2000);
      });
    }
  </script>
</body>
</html>
